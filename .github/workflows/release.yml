name: Release (reusable)

# Call on push of a v* tag. Builds the Arch package, attaches it to the
# GitHub Release, pokes COPR (if a webhook URL secret is set), and asks
# arch-repo to republish (if a dispatch token secret is set — otherwise
# arch-repo picks the release up on its next scheduled run).

on:
  workflow_call:
    inputs:
      pkgbuild-dir:
        type: string
        default: packaging
    secrets:
      COPR_CONFIG:
        description: Content of ~/.config/copr (copr-cli token file) — builds the SRPM in CI and submits it directly (optional; note the token expires ~180 days)
        required: false
      COPR_WEBHOOK_URL:
        description: COPR custom-webhook URL for this package (optional fallback when COPR_CONFIG is unset)
        required: false
      ARCH_REPO_TOKEN:
        description: Fine-grained PAT allowed to send repository_dispatch to arch-repo (optional)
        required: false

jobs:
  arch-package:
    uses: MasonRhodesDev/packaging-workflows/.github/workflows/arch-package.yml@main
    permissions:
      contents: write
    with:
      pkgbuild-dir: ${{ inputs.pkgbuild-dir }}
      publish: true

  copr:
    name: Publish to COPR
    runs-on: ubuntu-latest
    container: registry.fedoraproject.org/fedora:42
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Build SRPM and submit with copr-cli (or fall back to webhook)
        env:
          COPR_CONFIG: ${{ secrets.COPR_CONFIG }}
          COPR_WEBHOOK_URL: ${{ secrets.COPR_WEBHOOK_URL }}
        run: |
          if [ -n "$COPR_CONFIG" ]; then
            dnf -y install copr-cli rpm-build rpmlint rust cargo git-core curl-minimal
            mkdir -p ~/.config
            printf '%s' "$COPR_CONFIG" > ~/.config/copr
            chmod 600 ~/.config/copr
            git config --global --add safe.directory "$GITHUB_WORKSPACE"
            bash packaging/build-srpm.sh --copr
          elif [ -n "$COPR_WEBHOOK_URL" ]; then
            curl -fsS -X POST "$COPR_WEBHOOK_URL"
          else
            echo "Neither COPR_CONFIG nor COPR_WEBHOOK_URL configured — skipping COPR publish"
          fi

  update-arch-repo:
    name: Republish arch-repo
    needs: arch-package
    runs-on: ubuntu-latest
    steps:
      - name: repository_dispatch to MasonRhodesDev/arch-repo
        env:
          TOKEN: ${{ secrets.ARCH_REPO_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "ARCH_REPO_TOKEN not configured — arch-repo will pick this release up on its scheduled run"
            exit 0
          fi
          curl -fsS -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/MasonRhodesDev/arch-repo/dispatches \
            -d '{"event_type":"package-released"}'
