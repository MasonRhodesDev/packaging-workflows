name: RPM packaging check (reusable)

on:
  workflow_call:
    inputs:
      spec-name:
        description: Base name of the spec / rpmlintrc under packaging/ (e.g. sni-watcher)
        type: string
        required: true

jobs:
  rpm:
    name: SRPM → RPM (%check) → rpmlint
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - name: Install build tooling
        run: >-
          dnf -y install git rust cargo cargo-rpm-macros systemd-rpm-macros
          rpm-build rpmlint rpmdevtools dnf-plugins-core xz

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Trust the checkout (container runs as root)
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Build SRPM from HEAD
        run: ./packaging/build-srpm.sh --head

      - name: Install BuildRequires
        run: dnf builddep -y ~/rpmbuild/SRPMS/${{ inputs.spec-name }}-*.src.rpm

      - name: Rebuild binary RPM (runs %check — the full test suite)
        run: |
          srpm=$(ls ~/rpmbuild/SRPMS/${{ inputs.spec-name }}-*.src.rpm | head -1)
          rpmbuild --rebuild "$srpm"

      - name: rpmlint (gating)
        run: |
          rpmlint --rpmlintrc packaging/${{ inputs.spec-name }}.rpmlintrc \
            ~/rpmbuild/SRPMS/${{ inputs.spec-name }}-*.src.rpm \
            ~/rpmbuild/RPMS/*/${{ inputs.spec-name }}-*.rpm
