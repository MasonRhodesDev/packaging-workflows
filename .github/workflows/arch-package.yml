name: Arch package (reusable)

on:
  workflow_call:
    inputs:
      pkgbuild-dir:
        description: Directory containing the PKGBUILD
        type: string
        default: packaging
      publish:
        description: Upload the built package to the GitHub Release for this tag
        type: boolean
        default: false

jobs:
  makepkg:
    name: makepkg → namcap
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - name: Install build tooling
        run: pacman -Syu --noconfirm --needed base-devel git sudo namcap github-cli

      - uses: actions/checkout@v4

      - name: Trust the checkout (container runs as root)
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Version consistency gate (tag builds)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkgver=$(sed -n 's/^pkgver=//p' "${{ inputs.pkgbuild-dir }}/PKGBUILD")
          if [ "$tag" != "$pkgver" ]; then
            echo "::error::tag v$tag does not match PKGBUILD pkgver=$pkgver"
            exit 1
          fi
          if [ -f Cargo.toml ]; then
            cargo_ver=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)
            if [ -n "$cargo_ver" ] && [ "$cargo_ver" != "$tag" ]; then
              echo "::error::Cargo.toml version $cargo_ver does not match tag v$tag"
              exit 1
            fi
          fi

      # The PKGBUILD's source entry is named $pkgname-$pkgver.tar.gz; providing
      # the file locally makes makepkg skip the download, so PR/branch builds
      # work before any tag or release exists.
      - name: Snapshot source tarball from HEAD
        run: |
          cd "${{ inputs.pkgbuild-dir }}"
          pkgname=$(sed -n 's/^pkgname=//p' PKGBUILD)
          pkgver=$(sed -n 's/^pkgver=//p' PKGBUILD)
          git -C "$GITHUB_WORKSPACE" archive --format=tar.gz \
            --prefix "$pkgname-$pkgver/" -o "$PWD/$pkgname-$pkgver.tar.gz" HEAD

      - name: Build package
        run: |
          useradd -m builder
          echo 'builder ALL=(ALL) NOPASSWD: ALL' > /etc/sudoers.d/builder
          chown -R builder: .
          cd "${{ inputs.pkgbuild-dir }}"
          su builder -c 'makepkg -s --noconfirm'

      - name: namcap (informational)
        run: namcap "${{ inputs.pkgbuild-dir }}"/*.pkg.tar.zst || true

      - uses: actions/upload-artifact@v4
        with:
          name: arch-package
          path: ${{ inputs.pkgbuild-dir }}/*.pkg.tar.zst

      - name: Upload to GitHub Release
        if: inputs.publish && startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes || true
          gh release upload "$GITHUB_REF_NAME" "${{ inputs.pkgbuild-dir }}"/*.pkg.tar.zst --clobber
